# Prism Development Docker Compose
# Usage: podman compose --env-file .dev.env -f docker-compose.dev.yaml up -d
# Source mounted for hot-reload, /tmp volumes for easy cleanup

services:
  postgres:
    image: postgres:16-alpine
    container_name: prism-postgres-dev
    ports:
      - "5432:5432"
    volumes:
      - /tmp/prism-postgres:/var/lib/postgresql/data:z
      - ./docker/init:/docker-entrypoint-initdb.d:ro,z
    environment:
      POSTGRES_DB: prism
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: devpassword
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism -d prism"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  prism:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    container_name: prism-dev
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8766:8765"
    volumes:
      - .:/app:z
      - /tmp/prism-claude:/home/appuser/.claude:z
    environment:
      PRISM_SERVER_LOG_LEVEL: DEBUG
      PRISM_DATABASE_URL: postgresql+asyncpg://prism:devpassword@postgres:5432/prism
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8765'"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
