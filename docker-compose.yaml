# Prism Production Docker Compose
# Usage: podman compose --env-file .prod.env up -d
# Persists: PostgreSQL data + Claude CLI sessions under ~/.local/share/prism/

services:
  prism:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod
    container_name: prism
    init: true
    restart: always
    ports:
      - "8765:8765"
    volumes:
      - ~/.local/share/prism/claude:/home/appuser/.claude:z
      - ${PRISM_OVERRIDE_CONFIG:-/dev/null}:/home/appuser/.config/prism/prism.yaml:ro,z
    environment:
      PRISM_SERVER_LOG_LEVEL: INFO
      PRISM_DATABASE_URL: ${PRISM_DATABASE_URL}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8765'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: prism-postgres
    restart: always
    volumes:
      - ~/.local/share/prism/postgres:/var/lib/postgresql/data:z
    environment:
      POSTGRES_DB: prism
      POSTGRES_USER: prism
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism -d prism"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-~/.config/prism/postgres_password}
