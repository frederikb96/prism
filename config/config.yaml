# Prism Default Configuration
#
# This file contains all default values. To override:
# - Place a custom prism.yaml at ~/.config/prism/prism.yaml
# - Set environment variables: PRISM_<SECTION>_<KEY> (e.g., PRISM_SERVER_PORT)
#
# Loading order: env vars > prism.yaml > config.yaml (this file)

server:
  port: 8765
  transport: sse
  log_level: INFO

search:
  max_query_length: 10000

levels:
  0:
    worker_timeout_seconds: 80
    worker_visible_timeout: 30
  1:
    worker_timeout_seconds: 140
    worker_visible_timeout: 50
    agent_allocation:
      claude_search: 1
      gemini_search: 1
      tavily_search: 1
      perplexity_search: 1
  2:
    worker_timeout_seconds: 230
    worker_visible_timeout: 120
    agent_allocation:
      claude_search: 2
      gemini_search: 2
      tavily_search: 1
      perplexity_search: 1
  3:
    worker_timeout_seconds: 600
    worker_visible_timeout: 480
    agent_allocation:
      claude_search: 3
      gemini_search: 2
      tavily_search: 2
      perplexity_search: 1

models:
  session_manager:
    1:
      model: opus
      effort: low
    2:
      model: opus
      effort: low
    3:
      model: opus
  claude_workers:
    0:
      model: haiku
    1:
      model: opus
      effort: low
    2:
      model: opus
      effort: low
    3:
      model: opus
  gemini_workers:
    0:
      model: gemini-3-flash-preview
    1:
      model: gemini-3-flash-preview
    2:
      model: gemini-3-pro-preview
    3:
      model: gemini-3-pro-preview

level0:
  default_providers:
    - claude_search

retry:
  max_transient_retries: 3
  base_delay_seconds: 1.0
  max_delay_seconds: 8.0
  exponential_base: 2.0
  max_validation_retries: 5

process:
  sigterm_timeout_seconds: 2.0
  sigkill_timeout_seconds: 5.0

database:
  url: postgresql+asyncpg://prism:prism@localhost:5432/prism
  pool_size: 20
  max_overflow: 10

retention:
  session_ttl_days: 30
